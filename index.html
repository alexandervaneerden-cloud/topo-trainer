<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1b7f5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Topo Trainer</title>
<style>
  :root{
    --green:#1b7f5c; --green-d:#12603f; --green-l:#3fbf8a;
    --orange:#ff8a3d; --orange-d:#e96f1f;
    --blue:#3d8bff; --purple:#8b5cf6; --pink:#ff5d8f; --yellow:#ffc93c;
    --ink:#1d2b26; --muted:#6b7c74;
    --bg:#f3f7f2; --card:#ffffff; --line:#e3ece5;
    --plaats:#3d8bff; --provincie:#8b5cf6; --water:#12a5c4; --gebied:#ff8a3d;
    --shadow:0 8px 24px rgba(20,60,45,.12);
    --radius:20px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Baloo 2',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(180deg,#eaf5ee,#f3f7f2 240px);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit}
  .app{height:100dvh;height:100vh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative}

  /* Top bar */
  .topbar{
    padding:calc(var(--safe-t) + 14px) 18px 12px;
    display:flex;align-items:center;gap:12px;flex:0 0 auto;
  }
  .topbar .title{font-size:22px;font-weight:800;flex:1;display:flex;align-items:center;gap:9px}
  .topbar .title .globe{font-size:24px}
  .backbtn{
    width:42px;height:42px;border-radius:14px;background:var(--card);
    box-shadow:var(--shadow);font-size:20px;display:flex;align-items:center;justify-content:center;
    color:var(--green-d);flex:0 0 auto;
  }
  .xpchip{
    display:flex;align-items:center;gap:7px;background:var(--card);
    box-shadow:var(--shadow);border-radius:16px;padding:7px 12px;font-weight:800;font-size:14px;color:var(--green-d)
  }
  .xpchip .lvl{background:var(--yellow);color:#6a4a00;border-radius:9px;padding:1px 7px;font-size:12px}

  /* Scroll body */
  .screen{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding:4px 18px calc(30px + var(--safe-b));-webkit-overflow-scrolling:touch}
  .screen.nopad{padding:0}

  /* Cards */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .muted{color:var(--muted)}
  .center{text-align:center}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;
    background:var(--green);color:#fff;font-weight:800;font-size:17px;
    border-radius:16px;padding:15px 20px;width:100%;box-shadow:0 6px 16px rgba(27,127,92,.32);
    transition:transform .08s ease, filter .15s;
  }
  .btn:active{transform:scale(.97)}
  .btn.orange{background:var(--orange);box-shadow:0 6px 16px rgba(255,138,61,.36)}
  .btn.ghost{background:var(--card);color:var(--green-d);box-shadow:var(--shadow)}
  .btn.sm{font-size:15px;padding:11px 14px;width:auto}
  .btn.blue{background:var(--blue);box-shadow:0 6px 16px rgba(61,139,255,.32)}
  .btn:disabled{filter:grayscale(.5) opacity(.5);pointer-events:none}
  .btn-row{display:flex;gap:10px}
  .btn-row>*{flex:1}

  /* Set cards */
  .set{display:flex;align-items:center;gap:14px;text-align:left;width:100%}
  .set .thumb{
    width:64px;height:64px;border-radius:16px;object-fit:cover;flex:0 0 auto;background:#dce9e0;
    display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--green)
  }
  .set .info{flex:1;min-width:0}
  .set .info h3{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .set .info .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .stars{color:var(--yellow);font-size:15px;letter-spacing:1px}
  .stars .off{color:#dfe7e1}
  .bar{height:8px;background:#eef3ee;border-radius:99px;overflow:hidden;margin-top:8px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green-l),var(--green));border-radius:99px;transition:width .5s}

  .cat-dot{width:11px;height:11px;border-radius:50%;display:inline-block;vertical-align:middle}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--muted);background:#f1f5f1;border-radius:99px;padding:5px 10px;margin:3px 4px 0 0}

  .sectionlbl{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:6px 2px 10px}

  /* Empty state */
  .empty{text-align:center;padding:40px 20px}
  .empty .big{font-size:56px;margin-bottom:6px}
  .empty h2{font-size:22px;margin-bottom:8px}
  .empty p{color:var(--muted);margin:0 0 22px;line-height:1.5}

  /* Form fields */
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:700;font-size:14px;margin-bottom:6px}
  .input{
    width:100%;border:2px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px;background:#fbfdfb;color:var(--ink);
  }
  .input:focus{outline:none;border-color:var(--green-l)}
  textarea.input{resize:vertical;min-height:90px;line-height:1.4}

  /* Category chooser */
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .catbtn{
    display:flex;align-items:center;gap:9px;border:2px solid var(--line);border-radius:14px;padding:12px;font-weight:700;font-size:15px;background:#fbfdfb;color:var(--ink);transition:.12s
  }
  .catbtn[data-on="1"]{border-color:transparent;color:#fff}
  .catbtn .k{font-size:22px}
  .catbtn .cnt{margin-left:auto;font-size:13px;opacity:.85;font-weight:800}

  /* Mode chooser */
  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modebtn{
    border:3px solid var(--line);border-radius:18px;padding:18px 12px;text-align:center;background:#fbfdfb;transition:.12s
  }
  .modebtn[data-on="1"]{border-color:var(--green);background:#effaf3}
  .modebtn .ic{font-size:34px}
  .modebtn .nm{font-weight:800;font-size:16px;margin-top:6px}
  .modebtn .ds{font-size:12px;color:var(--muted);margin-top:2px}

  /* MAP */
  .mapwrap{position:relative;width:100%;border-radius:16px;overflow:hidden;background:#dfe9e1;user-select:none;touch-action:manipulation}
  .mapwrap img{display:block;width:100%;height:auto;pointer-events:none}
  .pin{
    position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;
    border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;color:#fff;z-index:2;
  }
  .pin.small{width:16px;height:16px;border-width:2px}
  .pin .lbl{
    position:absolute;top:-6px;left:50%;transform:translate(-50%,-100%);white-space:nowrap;
    background:rgba(29,43,38,.92);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:8px;pointer-events:none
  }
  .target{
    position:absolute;transform:translate(-50%,-50%);z-index:5;pointer-events:none;
  }
  .target .ring{width:34px;height:34px;border-radius:50%;border:4px solid var(--orange);box-shadow:0 0 0 4px rgba(255,138,61,.28);animation:pulse 1.3s infinite}
  .target .arrow{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:26px;color:var(--orange);animation:bob 1s infinite}
  @keyframes pulse{0%{transform:scale(.85);opacity:1}70%{transform:scale(1.35);opacity:.25}100%{transform:scale(.85);opacity:1}}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-6px)}}

  /* editor pin list */
  .pinrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .pinrow:last-child{border-bottom:none}
  .pinrow .num{width:26px;height:26px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
  .pinrow .nm{flex:1;font-weight:700}
  .pinrow .del{color:var(--pink);font-size:20px;padding:4px 8px}

  /* practice screen */
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .qcount{font-weight:800;color:var(--muted)}
  .qprog{height:8px;background:#e6efe8;border-radius:99px;overflow:hidden;flex:1;margin:0 12px}
  .qprog>i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .3s}
  .streakchip{font-weight:800;color:var(--orange-d)}
  .qtitle{font-size:19px;font-weight:800;text-align:center;margin:12px 0}
  .qtitle .cat{font-size:14px;color:var(--muted);font-weight:700;display:block;margin-bottom:2px}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
  .choice{
    border:2px solid var(--line);border-radius:16px;padding:16px 12px;font-weight:800;font-size:16px;background:#fbfdfb;color:var(--ink);transition:.12s;min-height:58px
  }
  .choice.good{border-color:var(--green);background:#e7f8ee;color:var(--green-d)}
  .choice.bad{border-color:var(--pink);background:#ffeef3;color:#c53a63}
  .typerow{display:flex;gap:10px;margin-top:14px}
  .typerow .input{flex:1;text-align:center;font-size:18px;font-weight:700}

  .feedback{text-align:center;margin-top:14px;min-height:26px;font-weight:800;font-size:17px}
  .feedback.good{color:var(--green)}
  .feedback.bad{color:var(--pink)}
  .feedback .ans{color:var(--ink);font-weight:800}

  /* results */
  .result-big{font-size:64px;text-align:center}
  .scorepill{display:inline-block;background:var(--yellow);color:#6a4a00;font-weight:800;border-radius:99px;padding:6px 16px;font-size:17px;margin-top:6px}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(24px + var(--safe-b));transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;font-weight:700;z-index:200;box-shadow:var(--shadow);max-width:88%;text-align:center;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}

  /* confetti canvas */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:150}

  /* level up / fullscreen overlay */
  .overlay{position:fixed;inset:0;background:rgba(15,40,30,.55);z-index:180;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
  .overlay .box{background:#fff;border-radius:24px;padding:28px 24px;text-align:center;box-shadow:var(--shadow);max-width:360px;width:100%;animation:pop .35s}
  @keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

  .fab-help{position:absolute;top:calc(var(--safe-t) + 16px);right:18px}
  .hidden{display:none!important}
  .hint{font-size:13px;color:var(--muted);line-height:1.5;margin-top:8px}
  a{color:var(--green-d)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="backbtn hidden" id="backBtn">‹</button>
    <div class="title" id="topTitle"><span class="globe">🌍</span> Topo Trainer</div>
    <div class="xpchip" id="xpChip" title="Jouw punten en niveau">⭐ <span id="xpVal">0</span> <span class="lvl">Lv <span id="lvlVal">1</span></span></div>
  </div>
  <div class="screen" id="screen"></div>
</div>
<canvas id="confetti"></canvas>
<div class="toast" id="toast"></div>
<input type="file" id="fileImg" accept="image/*" class="hidden">
<input type="file" id="fileJson" accept="application/json,.json" class="hidden">

/* ---------- IndexedDB mini-wrapper ---------- */
const DB = (()=>{
  let dbp;
  function open(){
    if(dbp) return dbp;
    dbp = new Promise((res,rej)=>{
      const r = indexedDB.open('topo-trainer',1);
      r.onupgradeneeded = ()=> r.result.createObjectStore('kv');
      r.onsuccess = ()=> res(r.result);
      r.onerror = ()=> rej(r.error);
    });
    return dbp;
  }
  async function get(k){
    const db = await open();
    return new Promise((res,rej)=>{
      const t = db.transaction('kv','readonly').objectStore('kv').get(k);
      t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);
    });
  }
  async function set(k,v){
    const db = await open();
    return new Promise((res,rej)=>{
      const t = db.transaction('kv','readwrite').objectStore('kv').put(v,k);
      t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
    });
  }
  return {get,set};
})();

/* ---------- State ---------- */
const SCHEMA = 3;
let state = null;
let saveTimer = null;

function blankState(){
  return { schema:SCHEMA, sets:[], progress:{}, xp:0, createdAt:Date.now() };
}
async function loadState(){
  let s = await DB.get('state');
  if(!s){
    // migratie: eventueel oude localStorage
    try{ const ls = localStorage.getItem('topo-state'); if(ls) s = JSON.parse(ls); }catch(e){}
  }
  state = s && s.sets ? s : blankState();
  state.schema = SCHEMA;
  if(!state.progress) state.progress = {};
  if(typeof state.xp!=='number') state.xp = 0;
}
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ DB.set('state', state).catch(e=>console.warn(e)); }, 150);
}

/* ---------- Leitner / mastery ---------- */
function prog(pinId){
  if(!state.progress[pinId]) state.progress[pinId] = {seen:0,correct:0,wrong:0,box:0,streak:0};
  return state.progress[pinId];
}
function masteryOfSet(set){
  const pins = set.pins||[];
  if(!pins.length) return 0;
  let sum=0;
  pins.forEach(p=>{ const g=prog(p.id); sum += Math.min(g.box,5)/5; });
  return sum/pins.length; // 0..1
}
function starsFor(m){ return Math.round(m*3); } // 0..3

/* ---------- XP / level ---------- */
function levelFor(xp){ return Math.floor(xp/100)+1; }
function addXp(n){
  const before = levelFor(state.xp);
  state.xp += n;
  const after = levelFor(state.xp);
  renderXp();
  save();
  if(after>before) levelUp(after);
}
function renderXp(){
  $('#xpVal').textContent = state.xp;
  $('#lvlVal').textContent = levelFor(state.xp);
}

/* ---------- Helpers ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function norm(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]/g,'');
}
function lev(a,b){
  a=norm(a);b=norm(b);
  const m=[...Array(a.length+1)].map((_,i)=>[i,...Array(b.length).fill(0)]);
  for(let j=0;j<=b.length;j++)m[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
    m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return m[a.length][b.length];
}
function toast(msg,ms=1800){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),ms);
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* image resize to dataURL */
function fileToImageData(file, maxDim=1400){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      let {width:w,height:h}=img;
      const scale=Math.min(1,maxDim/Math.max(w,h));
      w=Math.round(w*scale); h=Math.round(h*scale);
      const c=document.createElement('canvas'); c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res({data:c.toDataURL('image/jpeg',0.82), w, h});
    };
    img.onerror=e=>{URL.revokeObjectURL(url);rej(e)};
    img.src=url;
  });
}

}

function pickImage(){
  const inp=$('#fileImg'); inp.value='';
  inp.onchange=async()=>{
    const f=inp.files[0]; if(!f)return;
    toast('Foto laden…');
    try{
      const {data,w,h}=await fileToImageData(f);
      ed.image=data; ed.imageW=w; ed.imageH=h;
      drawEditor($('#screen'));
    }catch(e){toast('Kon foto niet laden');}
  };
  inp.click();
}

function addPinAt(x,y,scr){
  if(ed._queue.length){
    const q=ed._queue.shift();
    ed.pins.push({id:uid(),x,y,label:q.name,category:q.category});
    drawEditor(scr);
    if(!ed._queue.length)toast('Alle plekjes geplaatst! 🎉');
    return;
  }
  const name=prompt('Naam van dit plekje ('+CATS[ed._cat].label+'):');
  if(name&&name.trim()){
    ed.pins.push({id:uid(),x,y,label:name.trim(),category:ed._cat});
  }
  drawEditor(scr);
}

      ${[5,10,20,999].map(n=>`<button class="catbtn" data-len="${n}" data-on="${sessionOpts.len===n?1:0}" style="${sessionOpts.len===n?'background:var(--green)':''}"><span class="k">${n===999?'♾️':'🎯'}</span> ${n===999?'Alles':n+' vragen'}</button>`).join('')}
    </div>

    <button class="btn orange" id="start" style="margin-top:22px" ${total?'':'disabled'}>▶️ Start (${total} beschikbaar)</button>
  `;
  $$('.modebtn',scr).forEach(b=>b.onclick=()=>{sessionOpts.mode=b.dataset.mode;renderSetup(r,scr);});
  $$('#catSel .catbtn',scr).forEach(b=>b.onclick=()=>{
    const c=b.dataset.cat;
    if(sessionOpts.cats.includes(c)){ if(sessionOpts.cats.length>1)sessionOpts.cats=sessionOpts.cats.filter(x=>x!==c); }
    else sessionOpts.cats.push(c);
    renderSetup(r,scr);
  });
  $$('#lenSel .catbtn',scr).forEach(b=>b.onclick=()=>{sessionOpts.len=+b.dataset.len;renderSetup(r,scr);});
  $('#start').onclick=()=>startSession(s);
}

/* ============================================================
   PRACTICE
   ============================================================ */
let sess=null;
function startSession(set){
  let pool=(set.pins||[]).filter(p=>sessionOpts.cats.includes(p.category));
  // weight: minder geleerde plekjes vaker; sorteer op box, dan shuffle binnen
  pool=shuffle(pool).sort((a,b)=>prog(a.id).box-prog(b.id).box);
  const n=Math.min(sessionOpts.len,pool.length);
  // pak de n minst-geleerde, maar shuffle de volgorde
  let chosen=shuffle(pool.slice(0,Math.max(n, Math.min(pool.length,n))));
  chosen=chosen.slice(0,n);
  sess={set,mode:sessionOpts.mode,queue:shuffle(chosen),i:0,total:chosen.length,correct:0,streak:0,best:0,answered:false,results:[]};
  go('practice',{setId:set.id});
}

function renderPractice(r,scr){
  if(!sess){go('home',{},true);return;}
  if(sess.i>=sess.total){ go('results',{setId:sess.set.id},true); return; }
  const pin=sess.queue[sess.i];
  $('#topTitle').textContent=sess.set.name;
  const pct=Math.round(sess.i/sess.total*100);
  // build choices for MC
  let choicesHtml='';
  if(sess.mode==='mc'){
    let others=sess.set.pins.filter(p=>p.id!==pin.id&&p.category===pin.category).map(p=>p.label);
    if(others.length<3) others=others.concat(sess.set.pins.filter(p=>p.id!==pin.id&&p.category!==pin.category).map(p=>p.label));
    others=[...new Set(others)].filter(l=>norm(l)!==norm(pin.label));
    const opts=shuffle([pin.label,...shuffle(others).slice(0,3)]);
    sess._opts=opts;
    choicesHtml=`<div class="choices" id="choices">${opts.map(o=>`<button class="choice" data-opt="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;
  }else{
    choicesHtml=`<div class="typerow">
        <input class="input" id="typeIn" placeholder="Typ de naam…" autocomplete="off" autocorrect="off" autocapitalize="words" enterkeyhint="go">
        <button class="btn sm" id="typeGo" style="width:auto">OK</button>
      </div>`;
  }

  scr.innerHTML=`
    <div class="qhead">
      <span class="qcount">${sess.i+1}/${sess.total}</span>
      <div class="qprog"><i style="width:${pct}%"></i></div>
      <span class="streakchip">${sess.streak>1?'🔥'+sess.streak:''}</span>
    </div>
    <div class="card" style="padding:8px">
      <div class="mapwrap" id="pmap">
        <img src="${sess.set.image}" alt="kaart">
        <div class="target" style="left:${pin.x*100}%;top:${pin.y*100}%">
          <div class="arrow">📍</div><div class="ring"></div>
        </div>
      </div>
    </div>
    <div class="qtitle"><span class="cat">${CATS[pin.category].icon} ${CATS[pin.category].label}</span>Welke ${CATS[pin.category].label.toLowerCase()} is dit?</div>
    ${choicesHtml}
    <div class="feedback" id="fb"></div>
    <button class="btn hidden" id="next" style="margin-top:6px">Volgende ›</button>
  `;

  sess.answered=false;
  if(sess.mode==='mc'){
    $$('#choices .choice',scr).forEach(b=>b.onclick=()=>answerMC(b,pin));
  }else{
    const inp=$('#typeIn');
    const submit=()=>answerType(inp.value,pin);
    $('#typeGo').onclick=submit;
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
    setTimeout(()=>inp.focus(),120);
  }
  $('#next').onclick=nextQ;
}

function answerMC(btn,pin){
  if(sess.answered)return;
  sess.answered=true;
  const ok=norm(btn.dataset.opt)===norm(pin.label);
  $$('#choices .choice').forEach(b=>{
    b.style.pointerEvents='none';
    if(norm(b.dataset.opt)===norm(pin.label))b.classList.add('good');
    else if(b===btn)b.classList.add('bad');
  });
  finishAnswer(ok,pin);
}
function answerType(val,pin){
  if(sess.answered)return;
  const d=lev(val,pin.label);
  const ok=d===0;
  const near=!ok && d<=1 && norm(pin.label).length>3;
  sess.answered=true;
  const inp=$('#typeIn'); if(inp){inp.disabled=true;$('#typeGo').disabled=true;}
  finishAnswer(ok,pin,near);
}

function finishAnswer(ok,pin,near){
  const g=prog(pin.id);
  g.seen++;
  if(ok){g.correct++;g.box=Math.min(5,g.box+1);g.streak++;sess.correct++;sess.streak++;sess.best=Math.max(sess.best,sess.streak);}
  else{g.wrong++;g.box=Math.max(0,g.box-1);g.streak=0;sess.streak=0;}
  sess.results.push({pin,ok});
  const fb=$('#fb');
  if(ok){
    const msgs=['Goed zo! 🎉','Top! 👏','Helemaal goed! ⭐','Yes! 💪','Knap! 🌟'];
    fb.className='feedback good';
    fb.textContent = sess.streak>=3 ? `${sess.streak} op rij! 🔥` : msgs[Math.floor(Math.random()*msgs.length)];
    beep(true);
    if(sess.streak===3||sess.streak===5||sess.streak%10===0&&sess.streak>0) confettiBurst();
    addXp(sess.streak>=3?15:10);
  }else{
    fb.className='feedback bad';
    fb.innerHTML = near ? `Bijna! Let op de spelling: <span class="ans">${esc(pin.label)}</span>` : `Het juiste antwoord is <span class="ans">${esc(pin.label)}</span>`;
    beep(false);
  }
  const nb=$('#next'); nb.classList.remove('hidden');
  save();
  // auto-advance sneller bij goed
  clearTimeout(sess._adv);
  sess._adv=setTimeout(()=>{ if(sess.answered&&sess.i<sess.total) nextQ(); }, ok?900:2200);
}
function nextQ(){ clearTimeout(sess._adv); sess.i++; render(); }

/* ============================================================
   RESULTS
   ============================================================ */
function renderResults(r,scr){
  if(!sess){go('home',{},true);return;}
  $('#topTitle').textContent='Klaar!';
  const pctScore=sess.total?Math.round(sess.correct/sess.total*100):0;
  let emoji='💪',title='Goed geoefend!';
  if(pctScore===100){emoji='🏆';title='Foutloos!';}
  else if(pctScore>=80){emoji='🌟';title='Heel knap!';}
  else if(pctScore>=50){emoji='👍';title='Lekker bezig!';}
  else{emoji='🚀';title='Blijf oefenen!';}
  const wrong=sess.results.filter(x=>!x.ok);
  scr.innerHTML=`
    <div class="card center">
      <div class="result-big">${emoji}</div>
      <h2>${title}</h2>
      <div class="scorepill">${sess.correct} / ${sess.total} goed</div>
      <p class="muted" style="margin-top:12px">Beste reeks: 🔥 ${sess.best} · +${sess.total?sess.correct*10:0} punten verdiend</p>
    </div>
    ${wrong.length?`<div class="card">
      <b>Nog even oefenen:</b>
      <div style="margin-top:8px">${[...new Set(wrong.map(w=>w.pin.label))].map(l=>`<span class="pill">${esc(l)}</span>`).join('')}</div>
    </div>`:`<div class="card center"><b>Geen fouten! 🎯</b></div>`}
    <button class="btn orange" id="again">🔁 Nog een keer</button>
    <button class="btn ghost" id="home" style="margin-top:12px">🏠 Terug naar overzicht</button>
  `;
  if(pctScore>=80)confettiBurst();
  const setId=sess.set.id;
  $('#again').onclick=()=>{ const s=state.sets.find(x=>x.id===setId); if(s)startSession(s); };
  $('#home').onclick=()=>{ nav=[{name:'home'}]; render(); };
}

/* ============================================================
   ABOUT
   ============================================================ */
function renderAbout(r,scr){
  $('#topTitle').textContent='Over Topo Trainer';
  scr.innerHTML=`
    <div class="card">
      <h3>🌍 Topo Trainer</h3>
      <p class="muted" style="line-height:1.6;margin-top:8px">
        Oefen topografie op je eigen manier. Maak een kaart van je topo-blaadje,
        tik de plekjes aan en oefen met keuzevragen of door zelf te typen.
        De app onthoudt wat je al goed kent en laat je moeilijke plekjes vaker zien.
      </p>
    </div>
    <div class="card">
      <h3>💾 Voortgang meenemen</h3>
      <p class="muted" style="line-height:1.6;margin-top:8px">
        Je voortgang wordt automatisch bewaard op dit apparaat. Wil je een reservekopie
        maken, of overstappen naar een nieuw apparaat of een nieuwe versie van de app?
        Gebruik <b>Opslaan/Exporteren</b> op het startscherm. Op het nieuwe apparaat
        kies je <b>Importeren</b> en laad je het bestand.
      </p>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn ghost sm" id="exp" style="width:100%">📤 Exporteren</button>
        <button class="btn ghost sm" id="imp" style="width:100%">📥 Importeren</button>
      </div>
    </div>
    <div class="card">
      <h3>📱 Op je telefoon zetten</h3>
      <p class="muted" style="line-height:1.6;margin-top:8px">
        Open deze app in je browser en kies <b>"Zet op beginscherm"</b> (Safari: deelknop → Zet op beginscherm).
        Dan opent hij als een echte app.
      </p>
    </div>
  `;
  $('#exp').onclick=doExport;
  $('#imp').onclick=doImport;
}

/* ============================================================
   IMPORT / EXPORT
   ============================================================ */
function doExport(){
  const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
  const d=new Date();
  const name=`topo-voortgang-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('Bestand opgeslagen 📤');
}
function doImport(){
  const inp=$('#fileJson'); inp.value='';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const data=JSON.parse(rd.result);
        if(!data||!Array.isArray(data.sets))throw 0;
        showOverlay(`
          <h2 style="margin-bottom:6px">📥 Importeren</h2>
          <p class="muted" style="font-size:14px;margin:0 0 16px">Dit bestand heeft <b>${data.sets.length}</b> kaart(en). Hoe wil je importeren?</p>
          <button class="btn orange" id="impMerge">➕ Samenvoegen met wat ik heb</button>
          <button class="btn" id="impReplace" style="margin-top:10px;background:var(--pink);box-shadow:none">♻️ Alles vervangen</button>
          <button class="btn ghost" id="impCancel" style="margin-top:10px">Annuleren</button>
        `);
        $('#impCancel').onclick=closeOverlay;
        $('#impReplace').onclick=()=>{ state=normImport(data); save(); closeOverlay(); nav=[{name:'home'}]; render(); toast('Alles geïmporteerd ✅'); };
        $('#impMerge').onclick=()=>{ mergeImport(data); save(); closeOverlay(); nav=[{name:'home'}]; render(); toast('Samengevoegd ✅'); };
      }catch(e){ toast('Ongeldig bestand'); }
    };
    rd.readAsText(f);
  };
  inp.click();
}
function normImport(data){
  return {schema:SCHEMA, sets:data.sets||[], progress:data.progress||{}, xp:data.xp||0, createdAt:data.createdAt||Date.now()};
}
function mergeImport(data){
  const byId={}; state.sets.forEach(s=>byId[s.id]=true);
  (data.sets||[]).forEach(s=>{ if(byId[s.id]){ s.id=uid(); (s.pins||[]).forEach(p=>{const old=p.id;p.id=uid(); if(data.progress&&data.progress[old])data.progress[p.id]=data.progress[old];}); } state.sets.push(s); });
  Object.assign(state.progress, data.progress||{});
  state.xp=Math.max(state.xp,data.xp||0);
}

/* ============================================================
   OVERLAY / LEVEL UP
   ============================================================ */
function showOverlay(html){
  closeOverlay();
  const o=document.createElement('div'); o.className='overlay'; o.id='ov';
  o.innerHTML=`<div class="box">${html}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)closeOverlay();});
  document.body.appendChild(o);
}
function closeOverlay(){ const o=$('#ov'); if(o)o.remove(); }
function levelUp(lvl){
  showOverlay(`<div style="font-size:56px">🎉</div><h2>Niveau ${lvl}!</h2><p class="muted" style="margin:8px 0 18px">Goed bezig, je verdient het!</p><button class="btn orange" id="lvOk">Verder</button>`);
  $('#lvOk').onclick=closeOverlay;
  confettiBurst();
}

/* ============================================================
   CONFETTI + SOUND
   ============================================================ */
let confW,confH,confParts=[],confRAF=null;
const confCanvas=$('#confetti'),confCtx=confCanvas.getContext('2d');
function sizeConf(){confW=confCanvas.width=innerWidth;confH=confCanvas.height=innerHeight;}
addEventListener('resize',sizeConf);sizeConf();
function confettiBurst(){
  const colors=['#ff8a3d','#3fbf8a','#3d8bff','#ffc93c','#ff5d8f','#8b5cf6'];
  for(let i=0;i<70;i++)confParts.push({x:confW/2+(Math.random()-.5)*120,y:confH*0.35,vx:(Math.random()-.5)*10,vy:-Math.random()*11-4,g:.35,s:6+Math.random()*7,c:colors[i%colors.length],r:Math.random()*6,vr:(Math.random()-.5)*.5,life:0});
  if(!confRAF)confRAF=requestAnimationFrame(confTick);
}
function confTick(){
  confCtx.clearRect(0,0,confW,confH);
  confParts=confParts.filter(p=>p.life<120&&p.y<confH+40);
  confParts.forEach(p=>{
    p.life++;p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
    confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.r);
    confCtx.fillStyle=p.c;confCtx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);confCtx.restore();
  });
  if(confParts.length)confRAF=requestAnimationFrame(confTick);
  else{confRAF=null;confCtx.clearRect(0,0,confW,confH);}
}
let actx=null,muted=false;
function beep(ok){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    o.type='sine';
    const t=actx.currentTime;
    if(ok){o.frequency.setValueAtTime(660,t);o.frequency.setValueAtTime(880,t+.09);}
    else{o.frequency.setValueAtTime(300,t);o.frequency.setValueAtTime(200,t+.12);}
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);
    o.start(t);o.stop(t+.3);
  }catch(e){}
}

/* ============================================================
   BOOT
   ============================================================ */
$('#backBtn').onclick=back;
(async()=>{
  await loadState();
  // Standaard-set (Oost-Nederland) eenmalig inladen bij een lege, verse app
  if(!state.seeded && !state.sets.length && window.DEFAULT_SET){
    state.sets.push(JSON.parse(JSON.stringify(window.DEFAULT_SET)));
    state.seeded=true;
    save();
  }
  nav=[{name:'home'}];
  render();
})();
</script>
